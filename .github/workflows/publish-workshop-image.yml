name: Publish workshop image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-workshop-image.yml
      - docker/workshop.Dockerfile
      - docker/workshop.zshrc
      - docker/zsh-completions/**
      - scripts/setup-workshop-shell.sh
      - scripts/start-workshop-herdr.sh
      - scripts/workshop-container-herdr.sh
      - docker-compose.yml
      - package.json
      - pnpm-lock.yaml

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-workshop-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish workshop image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/workshop.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/aie-loopcraft-workshop-2026:latest
            ghcr.io/${{ github.repository_owner }}/aie-loopcraft-workshop-2026:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=AI Engineer Loopcraft Workshop 2026 workshop computer
