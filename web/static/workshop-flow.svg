<svg xmlns="http://www.w3.org/2000/svg" width="760" height="980" viewBox="0 0 760 980" role="img" aria-labelledby="title desc">
  <title id="title">Loopcraft in Pi flow</title>
  <desc id="desc">A vertical flow from Herdr setup through Lakebed approval, loop daemon check, receipt, visible progression, and next issue.</desc>
  <defs>
    <style>
      .bg{fill:#fffdf8}.box{fill:#fbfaf5;stroke:#9c9282;stroke-width:1.4}.hot{fill:#f4f1e8;stroke:#2f5f6f;stroke-width:2}.txt{font:600 22px Georgia,serif;fill:#1b1a17}.small{font:15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#575247}.mono{font:12px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#2f5f6f}.arrow{stroke:#2f5f6f;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2f5f6f"/></marker>
  </defs>
  <rect class="bg" width="760" height="980" rx="18"/>
  <g transform="translate(60 45)">
    <rect class="box" width="640" height="96" rx="12"/>
    <text class="txt" x="24" y="36">0. Start with the rig already alive</text>
    <text class="small" x="24" y="64">Herdr has two panes: Pi chat plus running loop daemon/status output.</text>
    <text class="mono" x="24" y="84">preseed: container • Lakebed capsule • Pi extension shell</text>

    <path class="arrow" d="M320 108 V145"/>
    <rect class="hot" y="150" width="640" height="106" rx="12"/>
    <text class="txt" x="24" y="188">1. Lakebed shows the work</text>
    <text class="small" x="24" y="216">A compact board has blocked, ready, doing, and done lanes.</text>
    <text class="mono" x="24" y="238">one visible issue starts approval_required / needs you</text>

    <path class="arrow" d="M320 268 V305"/>
    <rect class="box" y="310" width="640" height="106" rx="12"/>
    <text class="txt" x="24" y="348">2. You approve one issue</text>
    <text class="small" x="24" y="376">The UI appends an issue.updated event instead of mutating hidden state.</text>
    <text class="mono" x="24" y="398">approval_required → ready</text>

    <path class="arrow" d="M320 428 V465"/>
    <rect class="box" y="470" width="640" height="106" rx="12"/>
    <text class="txt" x="24" y="508">3. Loop daemon reads provider events</text>
    <text class="small" x="24" y="536">The core adapter fetches Lakebed events, validates them, then projects state.</text>
    <text class="mono" x="24" y="558">LakebedIssueStore → Effect schemas → XState decision</text>

    <path class="arrow" d="M320 588 V625"/>
    <rect class="hot" y="630" width="640" height="106" rx="12"/>
    <text class="txt" x="24" y="668">4. Evidence lands</text>
    <text class="small" x="24" y="696">The loop writes receipt, run log, memory summary, and a control event.</text>
    <text class="mono" x="24" y="718">runs/receipts • runs/outbox • MEMORY.md</text>

    <path class="arrow" d="M320 748 V785"/>
    <rect class="box" y="790" width="640" height="106" rx="12"/>
    <text class="txt" x="24" y="828">5. Board moves left to right</text>
    <text class="small" x="24" y="856">A tiny progression marks the issue claimed/doing or creates exactly one next issue.</text>
    <text class="mono" x="24" y="878">ready → in_progress → receipt-backed next step</text>
  </g>
</svg>
